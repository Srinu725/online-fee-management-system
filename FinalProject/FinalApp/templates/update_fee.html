{% load static %}
<!DOCTYPE html>
<html>
<head>
  <title>Update Fee</title>
  <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
  <style>
    body {
      background: linear-gradient(to right, #b0f2b6, #e2f9e1);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .update-container {
      margin-top: 60px;
      background-color: #ffffff;
      padding: 40px 30px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    h3 {
      color: #28a745;
      font-weight: 600;
      margin-bottom: 30px;
      text-align: center;
    }

    label {
      font-weight: 500;
    }

    .form-control {
      border-radius: 8px;
      padding: 10px;
    }

    .form-control:focus {
      border-color: #28a745;
      box-shadow: 0 0 8px rgba(40, 167, 69, 0.4);
    }

    .btn-success {
      background-color: #28a745;
      border: none;
      transition: background-color 0.3s ease, transform 0.2s;
    }

    .btn-success:hover {
      background-color: #218838;
      transform: scale(1.02);
    }

    .btn-outline-secondary:hover {
      transform: scale(1.02);
    }
  </style>
</head>
<body>

<div class="container">
  <div class="col-md-6 offset-md-3 update-container">
    <h3>Update Fee for {{ student.user.username }}</h3>

    <form method="POST">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Amount Paid</label>
        <input type="number" name="amount_paid" step="0.01" class="form-control" value="{{ student.amount_paid }}" required>
      </div>

      <div class="row mt-3">
        <div class="col-md-6 d-grid">
          <button type="submit" class="btn btn-success">Update</button>
        </div>
        <div class="col-md-6 d-grid">
          <a href="{% url 'dashboard' %}" class="btn btn-success">Back to Dashboard</a>
        </div>
      </div>
    </form>
  </div>
</div>

</body>
</html>

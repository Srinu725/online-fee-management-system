{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact Us - Online Fee Management</title>
  <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
  <style>
    body {
      background: linear-gradient(to right, #b0f2b6, #e2f9e1); 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .contact-section {
      background: white;
      padding: 60px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    .section-title {
      font-size: 36px;
      font-weight: 700;
      color: #28a745;
      margin-bottom: 30px;
      text-align: center;
    }

    .contact-details {
      font-size: 18px;
      color: #333;
      line-height: 2;
    }

    .contact-details i {
      color: #28a745;
      margin-right: 10px;
    }

    .back-btn {
      margin-top: 40px;
      display: flex;
      justify-content: center;
    }

    .btn-home {
      background-color: #28a745;
      color: white;
      font-size: 16px;
      padding: 8px 20px;
      border: none;
      border-radius: 6px;
      text-decoration: none;
      transition: 0.3s ease;
    }

    .btn-home:hover {
      background-color: #1e7e34;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <div class="container my-5">
    <div class="contact-section">
      <h2 class="section-title">Contact Us</h2>
      <div class="contact-details">
        <p><i class="bi bi-envelope-fill"></i>Email: ratnamanohar036@gmail.com</p>
        <p><i class="bi bi-telephone-fill"></i>Phone: +91 98765 43210</p>
        <p><i class="bi bi-geo-alt-fill"></i>Address: Near ArogyaMatha Hospital,<br>kankipadu, Krishna, AP - 521151</p>
        <p><i class="bi bi-clock-fill"></i>Working Hours: Mon - Fri, 9:00 AM to 6:00 PM</p>
      </div>

      <div class="back-btn">
        <a href="{% url 'navbar' %}" class="btn-home">Back to Home</a>
      </div>
    </div>
  </div>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</body>
</html>
